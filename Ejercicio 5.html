<!--Ejercicio 5: Usando Clases y IDs-->

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Ejercicio 5</title>
    <link rel="stylesheet" href="ejercicio5.css">

</head>

<body>

    <h1>Diferencia entre selectores</h1>

    <p class="destacado">
        Este parrafo se ve resaltado porque esta en la clase destacado.
    </p>

    <p>Este es un parrafo normal sin clases.</p>

    <p id="resumen">
        Este parrafo tiene una ID asi que es unico en este documento.
    </p>

</body>

</html>
